spring:
  application:
    name: Tlias-web-management
    #配置数据库连接信息
  datasource:
    url: jdbc:mysql://localhost:3306/tlias
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

#配置myBatis日志输出
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #方式三：开启驼峰命名映射开关（最常用）
    map-underscore-to-camel-case: true

