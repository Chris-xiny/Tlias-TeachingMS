<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Tlias智能学习辅助系统</title>
    <style>
        /* 重置默认样式，消除边距影响 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 顶部导航栏样式 */
        .header {
            /* 灰色背景 */
            background-color: #808080;
            /* 上下内边距，让导航栏更高 */
            padding: 15px 20px;
            /* 弹性布局，实现一行显示 */
            display: flex;
            /* 左右两端对齐 */
            justify-content: space-between;
            /* 垂直居中 */
            align-items: center;
        }

        /* 标题样式：加粗 */
        .title {

            font-weight: bold;
            font-size: 32px;
            color: white;
            font-family: "楷体";
        }

        /* 退出登录链接样式 */
        .logout {
            text-decoration: none;
            color: #333;
        }

        /* 搜索表单区域 */
        .search-form {
            margin: 20px 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 20px;
            /* 元素之间的间距 */
        }

        .form-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-item label {
            font-size: 14px;
            color: #333;
        }

        .form-item input,
        .form-item select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 240px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }

        button {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-search {
            background-color: #007bff;
            color: white;
        }

        .btn-reset {
            background-color: #6c757d;
            color: white;
        }

        /* 表格展示区域 */
        .table-area {
            margin: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        .data-table th {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        .data-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .btn-edit {
            background-color: #28a745;
            color: white;
            margin-right: 5px;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
        }

        /* 页脚版权区域 */
        .footer {
            background-color: #666;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            margin-top: 30px;
            font-size: 14px;
        }

        .footer p {
            margin: 5px 0;
        }
        #container{ 
            width: 80%;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div id="container">
        <!-- 顶部导航栏 -->
        <div class="header">
            <!-- 左侧加粗标题 -->
            <div class="title">Tlias智能学习辅助系统</div>
            <!-- 右侧退出登录链接 -->
            <a href="#" class="logout">退出登录</a>
        </div>
        <!-- 2. 搜索表单区域 -->
        <div class="search-form" action="/save" method="post">
            <div class="form-item">
                <label for="name">姓名：</label>
                <input type="text" id="name" name="name" placeholder="请输入姓名">
            </div>
            <div class="form-item">
                <label for="gender">性别：</label>
                <select id="gender" name="gender">
                    <option value=""></option>
                    <option value="1">男</option>
                    <option value="2">女</option>
                </select>
            </div>
            <div class="form-item">
                <label for="position">职位：</label>
                <select id="position" name="position">
                    <option value=""></option>
                    <option value="1">班主任</option>
                    <option value="2">讲师</option>
                    <option value="3">学工主管</option>
                    <option value="4">教研主管</option>
                    <option value="5">咨询师</option>
                </select>
            </div>
            <div class="btn-group">
                <button class="btn-search">查询</button>
                <button class="btn-reset">清空</button>
            </div>
        </div>
        <!-- 3. 表格展示区域 -->
        <div class="table-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>头像</th>
                        <th>职位</th>
                        <th>入职日期</th>
                        <th>最后操作时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>令狐冲</td>
                        <td>男</td>
                        <td><img class="avatar" src="img/1.jpg" alt="头像">
                        </td>
                        <td>讲师</td>
                        <td>2023-01-15</td>
                        <td>2026-05-16 10:30:00</td>
                        <td>
                            <button class="btn-edit">编辑</button>
                            <button class="btn-delete">删除</button>
                        </td>
                    </tr>
                    <tr>
                        <td>任盈盈</td>
                        <td>女</td>
                        <td><img class="avatar" src="img/1.jpg" alt="头像">
                        </td>
                        <td>班主任</td>
                        <td>2023-03-20</td>
                        <td>2026-05-15 15:45:00</td>
                        <td>
                            <button class="btn-edit">编辑</button>
                            <button class="btn-delete">删除</button>
                        </td>
                    </tr>
                    <tr>
                        <td>岳不群</td>
                        <td>男</td>
                        <td><img class="avatar" src="img/1.jpg" alt="头像">
                        </td>
                        <td>教研主管</td>
                        <td>2022-09-01</td>
                        <td>2026-05-14 09:10:00</td>
                        <td>
                            <button class="btn-edit">编辑</button>
                            <button class="btn-delete">删除</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- 4. 页脚版权区域 -->
        <div class="footer">
            <p>江苏传智播客教育科技股份有限公司</p>
            <p>版权所有 Copyright 2006-2024 All Rights Reserved</p>
        </div>
    </div>
    <!-- 通过js为上面表格中数据行添加监听事件，要求鼠标移入后更换行背景色为#f2e2e2,移出后恢复，使用js新语法-->
     <script>
        // 获取表格数据行
        let trs = document.querySelectorAll('.data-table tbody tr');
        // 遍历数据行
        for (let i = 0; i < trs.length; i++) {
            // 为当前行添加鼠标移入移出事件
            trs[i].addEventListener('mouseenter',function () {
                // 鼠标移入时，更换行背景色为#f2e2
                this.style.backgroundColor = "#f2e2e2";
            } ) 
            trs[i].addEventListener('mouseleave',function () {
                // 鼠标移出时，恢复行背景色
                this.style.backgroundColor = "";
            } ) 
        }
     </script>
</body>

</html>
