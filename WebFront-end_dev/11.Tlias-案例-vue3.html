<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Tlias智能学习辅助系统</title>
    <style>
        /* 重置默认样式，消除边距影响 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 顶部导航栏样式 */
        .header {
            /* 灰色背景 */
            background-color: #808080;
            /* 上下内边距，让导航栏更高 */
            padding: 15px 20px;
            /* 弹性布局，实现一行显示 */
            display: flex;
            /* 左右两端对齐 */
            justify-content: space-between;
            /* 垂直居中 */
            align-items: center;
        }

        /* 标题样式：加粗 */
        .title {

            font-weight: bold;
            font-size: 32px;
            color: white;
            font-family: "楷体";
        }

        /* 退出登录链接样式 */
        .logout {
            text-decoration: none;
            color: #333;
        }

        /* 搜索表单区域 */
        .search-form {
            margin: 20px 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 20px;
            /* 元素之间的间距 */
        }

        .form-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-item label {
            font-size: 14px;
            color: #333;
        }

        .form-item input,
        .form-item select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 240px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }

        button {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-search {
            background-color: #007bff;
            color: white;
        }

        .btn-reset {
            background-color: #6c757d;
            color: white;
        }

        /* 表格展示区域 */
        .table-area {
            margin: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        .data-table th {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        .data-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .btn-edit {
            background-color: #28a745;
            color: white;
            margin-right: 5px;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
        }

        /* 页脚版权区域 */
        .footer {
            background-color: #666;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            margin-top: 30px;
            font-size: 14px;
        }

        .footer p {
            margin: 5px 0;
        }
        #container{ 
            width: 80%;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div id="container">
        <!-- 顶部导航栏 -->
        <div class="header">
            <!-- 左侧加粗标题 -->
            <div class="title">Tlias智能学习辅助系统</div>
            <!-- 右侧退出登录链接 -->
            <a href="#" class="logout">退出登录</a>
        </div>
        {{searchForm}}
        <!-- 2. 搜索表单区域 -->
        <div class="search-form">
            <div class="form-item">
                <label for="name">姓名：</label>
                <input type="text" id="name" v-model="searchForm.name" placeholder="请输入姓名">
            </div>
            <div class="form-item">
                <label for="gender">性别：</label>
                <select id="gender" v-model="searchForm.gender">
                    <option value=""></option>
                    <option value="1">男</option>
                    <option value="2">女</option>
                </select>
            </div>
            <div class="form-item">
                <label for="position">职位：</label>
                <select id="position" name="position" v-model="searchForm.position">
                    <option value=""></option>
                    <option value="1">班主任</option>
                    <option value="2">讲师</option>
                    <option value="3">学工主管</option>
                    <option value="4">教研主管</option>
                    <option value="5">咨询师</option>
                </select>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-search" v-on:click="search">查询</button>
                <button type="button" class="btn-reset" @click="clear">清空</button>
            </div>
        </div>
        <!-- 3. 表格展示区域 -->
        <div class="table-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>头像</th>
                        <th>职位</th>
                        <th>入职日期</th>
                        <th>最后操作时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="(emp, index) in empList" :key="emp.id">
                        <td>{{index+1}}</td>
                        <td>{{emp.name}}</td>
                        <td>{{emp.gender==1?'男':'女'}}</td>
                        <td><img class="avatar" :src="emp.img" :alt="emp.name"></td>
                        <td>
                            <!-- v-if 判断 -->
                            <span v-if="emp.position==1">班主任</span>
                            <span v-else-if="emp.position==2">讲师</span>
                            <span v-else-if="emp.position==3">学工主管</span>
                            <span v-else-if="emp.position==4">教研主管</span>
                            <span v-else-if="emp.position==5">咨询师</span>
                            <span v-else>其他</span>

                            <!-- v-show 判断 -->
                            <!-- <span v-show="emp.position==1">班主任</span>
                            <span v-show="emp.position==2">讲师</span>
                            <span v-show="emp.position==3">学工主管</span>
                            <span v-show="emp.position==4">教研主管</span>
                            <span v-show="emp.position==5">咨询师</span> -->
                        </td>
                        <td>{{emp.entryDate}}</td>
                        <td>{{emp.lastOpTime}}</td>
                        <td>
                            <button class="btn-edit">编辑</button>
                            <button class="btn-delete">删除</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- 4. 页脚版权区域 -->
        <div class="footer">
            <p>江苏传智播客教育科技股份有限公司</p>
            <p>版权所有 Copyright 2006-2024 All Rights Reserved</p>
        </div>
    </div>
    <!-- 通过js为上面表格中数据行添加监听事件，要求鼠标移入后更换行背景色为#f2e2e2,移出后恢复，使用js新语法-->
     <script type="module">
        // 创建Vue实例
        import {createApp} from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
        createApp({
            data(){
                return{
                    searchForm:{
                        name:'',
                        gender:'',
                        position:''
                    },
                    empList:[
                        {id:1,name:'令狐冲',gender:1,img:'img/1.jpg',position:2,entryDate:'2023-01-15',lastOpTime:'2026-05-16 10:30:00'},
                        {id:2,name:'任盈盈',gender:2,img:'img/1.jpg',position:5,entryDate:'2023-03-20',lastOpTime:'2026-05-15 15:45:00'},
                        {id:3,name:'小昭',gender:2,img:'img/1.jpg',position:2,entryDate:'2023-03-20',lastOpTime:'2026-05-15 15:45:00'},
                        {id:4,name:'小离',gender:2,img:'img/1.jpg',position:1,entryDate:'2023-03-20',lastOpTime:'2026-05-15 15:45:00'},
                        {id:5,name:'小雪',gender:2,img:'img/1.jpg',position:3,entryDate:'2023-03-20',lastOpTime:'2026-05-15 15:45:00'},
                        {id:6,name:'小无',gender:2,img:'img/1.jpg',position:4,entryDate:'2023-03-20',lastOpTime:'2026-05-15 15:45:00'},
                    ]
                }
            },
            methods:{
                search(){
                    console.log(this.searchForm)
                },
                clear(){
                    this.searchForm={
                        name:'',
                        gender:'',
                        position:''
                    }
                }
            }

        }).mount('#container')
     </script>
</body>

</html>
