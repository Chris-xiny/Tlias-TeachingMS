<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Tlias智能学习辅助系统</title>
    <style>
        /* 重置默认样式，消除边距影响 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 顶部导航栏样式 */
        .header {
            /* 灰色背景 */
            background-color: #808080;
            /* 上下内边距，让导航栏更高 */
            padding: 15px 20px;
            /* 弹性布局，实现一行显示 */
            display: flex;
            /* 左右两端对齐 */
            justify-content: space-between;
            /* 垂直居中 */
            align-items: center;
        }

        /* 标题样式：加粗 */
        .title {
            
            font-weight: bold;
            font-size: 32px;
            color: white;
            font-family: "楷体";
        }

        /* 退出登录链接样式 */
        .logout {
            text-decoration: none;
            color: #333;
        }
         /* 搜索表单区域 */
         .search-form {
            margin: 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 20px; /* 元素之间的间距 */
        }

        .form-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-item label {
            font-size: 14px;
            color: #333;
        }

        .form-item input,
        .form-item select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }

        button {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-search {
            background-color: #007bff;
            color: white;
        }

        .btn-reset {
            background-color: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="header">
        <!-- 左侧加粗标题 -->
        <div class="title">Tlias智能学习辅助系统</div>
        <!-- 右侧退出登录链接 -->
        <a href="#" class="logout">退出登录</a>
    </div>
     <!-- 2. 搜索表单区域 -->
     <div class="search-form" action="/save" method="post">
        <div class="form-item">
            <label>姓名：<input type="text" placeholder="请输入姓名"></label>
        </div>
        <div class="form-item">
            <label>性别：</label>
            <select>
                <option value=""></option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-item">
            <label>职位：</label>
            <select>
                <option value=""></option>
                <option value="班主任">班主任</option>
                <option value="讲师">讲师</option>
                <option value="学工主管">学工主管</option>
                <option value="教研主管">教研主管</option>
                <option value="咨询师">咨询师</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="btn-search">查询</button>
            <button class="btn-reset">清空</button>
        </div>
    </div>
</body>
</html>
