<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表单标签</title>
</head>
<body>
  <!-- form表单:
    action: 表单提交的url地址
    method: 提交方式
      get: 表单数据通过url提交
        1.get方式提交隐私数据的话，数据暴露在url中，不安全
        2.get方式提交数据，数据长度有限制,不适合大数据量的表单
      post: 表单数据通过请求体提交
        1.post方式提交隐私数据，数据不会暴露在url中，安全
        2.post方式提交数据，数据长度没有限制，适合大数据量的表单
   -->
    注意:表单项要想提交数据，必须设置name属性,表示当前表单项的名称
  <form action="/save" method="get">
  姓名:<input type="text" name="name"><br>
  年龄:<input type="test" name="age">
  <input type="submit" value="提交">
  </form>
</body>
</html>
